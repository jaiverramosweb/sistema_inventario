name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, pgsql, pdo_pgsql, zip

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: admin-front/pnpm-lock.yaml

      - name: Install Backend Dependencies
        run: |
          cd admin-back
          composer install --no-interaction --prefer-dist
          php artisan test

      - name: Install Frontend Deps and Build
        run: |
          cd admin-front
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT || 5922 }}
          command_timeout: 40m
          script: |
            if [ ! -d "/var/www/sistema_inventario/temp_deploy/.git" ]; then
                echo "📥 Cloning fresh repository..."
                rm -rf /var/www/sistema_inventario/temp_deploy
                git clone -b main https://github.com/jaiverramosweb/sistema_inventario.git /var/www/sistema_inventario/temp_deploy
            fi

            echo "♻️ Syncing temp_deploy to origin/main..."
            cd /var/www/sistema_inventario/temp_deploy
            git fetch --prune origin main
            git checkout main
            git reset --hard origin/main
            git clean -fdx
            git rev-parse --short HEAD

            cd /var/www/sistema_inventario/temp_deploy
            chmod +x deploy.sh
            ./deploy.sh
